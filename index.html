<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>洛克王国：世界 宠物图鉴</title>
  <link rel="stylesheet" href="style.css">

  <!-- favicon 小图标 -->
  <link rel="icon" href="public/leologo/leo_favicon.png" type="image/png">
  <link rel="shortcut icon" href="public/leologo/leo_favicon.png" type="image/png">

</head>
<body>

<!-- 顶部导航：左侧标题 + 右侧菜单 -->
<div class="top-bar">
  <h1>洛克王国：世界 宠物图鉴</h1>

  <div class="top-menu">
    <button class="top-menu-btn" onclick="location.href='index.html'">
      <img src="public/leologo/pet_icon.png" class="menu-icon" alt="图鉴">
      宠物图鉴
    </button>
    <button class="top-menu-btn" onclick="location.href='weakness.html'">
       <img src="public/leologo/element_icon.png" class="menu-icon">属性克制
    </button>
    <button class="top-menu-btn" onclick="location.href='ranking.html'">
      <img src="public/leologo/ranking_icon.png" class="menu-icon">
      种族值
    </button>
  </div>
</div>

<!-- 内容区域 -->
<div class="content">
  <div class="page-container">
    <div class="filter-bar" id="filterBar"></div>
    <div class="pet-grid" id="petGrid"></div>
  </div>
</div>

<!-- 返回顶部按钮 -->
<button id="backToTop" onclick="scrollToTop()">↑</button>

<script src="/data/load-pets.js"></script>

<script>
const petList = [...petList1, ...petList2, ...petList3, ...petList4, ...petList5, 
...petList6, ...petList7, ...petList8, ...petList9, ...petList10,
...petList11, ...petList12, ...petList13, ...petList14, ...petList15, 
...petList16, ...petList17, ...petList18, ...petList19, ...petList20,
...petList21, ...petList22, ...petList23, ...petList24, ...petList25, 
...petList26, ...petList27, ...petList28, ...petList29, ...petList30,
...petList31, ...petList32, ...petList33, ...petList34, ...petList35,
];
renderFilters();
renderPets(petList);

function renderFilters() {
  const bar = document.getElementById("filterBar");
  // 先清空
  bar.innerHTML = "";

  allElements.forEach(el => {
    const btn = document.createElement("button");
    btn.className = "filter-btn";

    if (el !== "全部" && elementColors[el]) {
      btn.style.backgroundColor = "#fff";
      btn.style.color = elementColors[el];
      btn.style.border = `2px solid ${elementColors[el]}`;
      btn.innerHTML = `<img src="public/icons/${el}.png" class="filter-icon">${el}`;
    } else {
      btn.textContent = el;
      btn.style.border = `2px solid #ccc`;
    }

    // 👇 点击切换 active（单选逻辑，同一时间只有一个选中）
    btn.onclick = () => {
      // 先清空所有 active
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      // 给当前按钮加 active
      btn.classList.add("active");
      // 执行原来的筛选
      filterPets(el);
    };

    bar.appendChild(btn);
  });
}

function renderPets(pets) {
  const grid = document.getElementById("petGrid");
  grid.innerHTML = "";
  pets.forEach(pet => {
    const card = document.createElement("div");
    card.className = "small-card";
    const elems = Array.isArray(pet.element) ? pet.element : [pet.element];
    const bg = elems.length === 1 ? elementColors[elems[0]] : `linear-gradient(135deg, ${elementColors[elems[0]]}, ${elementColors[elems[1]]})`;

    card.innerHTML = `
    <div class="avatar-box" style="background:${bg}">
      <img class="avatar" src="public/images/${pet.id}.png" alt="${pet.name}">
    </div>
    <h4>编号 #${pet.id}</h4>
    <h3>${pet.name}</h3>
    <div style="display:flex;gap:4px;justify-content:center;margin-top:6px;flex-wrap:wrap">
      ${elems.map(e => `
      <span class="element" style="background:#f8f8f8; border:2px solid ${elementColors[e]}; color:#0e0e0e; display:inline-flex; align-items:center; gap:4px;">
        <img src="public/icons/${e}.png" class="element-icon">
        ${e}
      </span>
      `).join('')}
    </div>
  `;
    card.onclick = () => location.href = `detail.html?id=${pet.id}`;
    grid.appendChild(card);
  });
}

function filterPets(type) {
  if (type === "全部") return renderPets(petList);
  const filtered = petList.filter(p => {
    const el = p.element;
    return Array.isArray(el) ? el.includes(type) : el === type;
  });
  renderPets(filtered);
}

// ========== 返回顶部功能 ==========
function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

// 滚动时显示/隐藏按钮
window.onscroll = function() {
  const btn = document.getElementById("backToTop");
  if (document.documentElement.scrollTop > 300) {
    btn.style.display = "block";
  } else {
    btn.style.display = "none";
  }
};

</script>

</html>
